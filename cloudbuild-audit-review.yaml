# Cloud Build — Audit Log Review (AU-6)
#
# Triggered by: Cloud Scheduler (weekly, Monday at 8:00 AM UTC)
# Queries BigQuery audit_logs datasets for anomalies across all projects.
# Archives report to GCS for 3PAO assessment portal.

substitutions:
  _GO_VERSION: '1.25'
  _TARGET_ENV: 'staging'
  _REVIEW_DAYS: '7'

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: audit-review
    name: golang:${_GO_VERSION}
    entrypoint: bash
    args:
      - -c
      - |
        mkdir -p /workspace/reports
        go run ./cmd/audit-review/ \
          --env ${_TARGET_ENV} \
          --days ${_REVIEW_DAYS} \
          --output-dir /workspace/reports \
          --warn-only

  - id: archive
    name: gcr.io/cloud-builders/gsutil
    entrypoint: bash
    args:
      - -c
      - |
        DATE=$(date +%Y-%m-%d)
        gsutil cp /workspace/reports/audit-review-*.* gs://${PROJECT_ID}-build-artifacts/audit-review/$${DATE}/ || true
    waitFor: ['audit-review']

timeout: 600s
