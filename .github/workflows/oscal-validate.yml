name: OSCAL Validation

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '**.go'
      - 'scripts/**'
      - 'package.json'
      - 'oscal/**'
  pull_request:
    paths:
      - '**.md'
      - '**.go'
      - 'scripts/**'
      - 'package.json'
      - 'oscal/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: compliance

      - uses: actions/checkout@v4
        with:
          repository: latentarchon/infra
          path: infra
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - uses: actions/checkout@v4
        with:
          repository: latentarchon/backend
          path: backend
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: compliance/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: compliance/go.sum

      - name: Run SSP generator tests
        working-directory: compliance
        run: go test ./cmd/generate-ssp/ -v -count=1

      - name: Generate OSCAL SSP (Go)
        if: hashFiles('infra') != '' && hashFiles('backend') != ''
        working-directory: compliance
        run: |
          go run ./cmd/generate-ssp/ \
            --infra-root "${{ github.workspace }}/infra" \
            --backend-root "${{ github.workspace }}/backend" \
            --baseline high \
            --out oscal/ssp.json \
            --evidence-dir evidence \
            -v

      - name: Generate OSCAL SSP (fallback)
        if: hashFiles('infra') == '' || hashFiles('backend') == ''
        working-directory: compliance
        run: |
          go run ./cmd/generate-ssp/ \
            --baseline high \
            --out oscal/ssp.json \
            --evidence-dir evidence \
            -v

      - run: npm ci
        working-directory: compliance

      - name: Validate OSCAL SSP (JSON Schema)
        run: npm run validate:oscal-schema
        working-directory: compliance

      - name: Validate OSCAL SSP (oscal-cli)
        run: |
          docker run --rm -v "${{ github.workspace }}/compliance:/data" \
            ghcr.io/metaschema-framework/oscal-cli:latest \
            validate /data/oscal/ssp.json
        continue-on-error: true

      - name: Policy Review Check
        working-directory: compliance
        run: go run ./cmd/policy-review/ --policies-dir policies --warn-only

      - name: SSP-IaC Drift Check
        if: hashFiles('infra') != '' && hashFiles('backend') != ''
        working-directory: compliance
        run: |
          go run ./cmd/check-ssp-iac-drift \
            --infra-root "${{ github.workspace }}/infra" \
            --backend-root "${{ github.workspace }}/backend"

      - name: Upload OSCAL SSP artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: oscal-ssp
          path: compliance/oscal/ssp.json
          retention-days: 90

      - name: Upload evidence artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: evidence-tiers
          path: compliance/evidence/
          retention-days: 90
