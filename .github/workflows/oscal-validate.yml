name: OSCAL Validation

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - 'scripts/**'
      - 'package.json'
  pull_request:
    paths:
      - '**.md'
      - 'scripts/**'
      - 'package.json'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate OSCAL SSP
        run: npm run generate:oscal

      - name: Validate OSCAL SSP
        run: |
          docker run --rm -v "${{ github.workspace }}:/data" \
            ghcr.io/metaschema-framework/oscal-cli:latest \
            validate /data/oscal/ssp.json

      - name: Upload OSCAL SSP artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: oscal-ssp
          path: oscal/ssp.json
          retention-days: 90
