name: Publish Compliance PDFs

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - 'scripts/**'
      - 'package.json'
  workflow_dispatch:

jobs:
  build-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build:pdfs

      - name: Verify PDFs generated
        run: |
          count=$(ls -1 dist/*.pdf 2>/dev/null | wc -l)
          echo "Generated $count PDFs"
          ls -lh dist/
          if [ "$count" -eq 0 ]; then
            echo "::error::No PDFs were generated"
            exit 1
          fi

      - name: Upload PDFs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: compliance-pdfs
          path: dist/*.pdf
          retention-days: 90

      - name: Upload public PDFs to release (latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for pdf in dist/public/*.pdf; do
            echo "Uploading $(basename "$pdf") to latest release..."
            gh release upload v2.0.0 "$pdf" --clobber || true
          done
