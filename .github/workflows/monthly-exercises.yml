name: Monthly Compliance Exercises (CP-4 + IR-3 + AT-2)

on:
  schedule:
    # 1st of every month at 6:00 AM UTC (2:00 AM ET)
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no GCP API calls)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  ADMIN_PROJECT_ID: latentarchon-admin-staging
  APP_PROJECT_ID: latentarchon-app-staging
  REGION: us-east1
  DB_INSTANCE: archon-db
  GCS_DOCUMENTS_BUCKET: latentarchon-admin-staging-documents
  KMS_KEYRING: archon
  KMS_KEY: archon-key

jobs:
  # ── CP-4: Contingency Plan Test ──────────────────────────────────
  contingency-test:
    name: CP-4 Contingency Plan Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build contingency-test CLI
        working-directory: contingency-test
        run: go build -o ../contingency-test-cli ./cmd/contingency-test

      - name: Authenticate to GCP (admin project)
        if: inputs.dry_run != 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/786733428651/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gh-deploy@latentarchon-admin-staging.iam.gserviceaccount.com

      - name: Run contingency plan test
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ./contingency-test-cli \
              --project-id "$ADMIN_PROJECT_ID" \
              --app-project-id "$APP_PROJECT_ID" \
              --region "$REGION" \
              --db-instance "$DB_INSTANCE" \
              --documents-bucket "$GCS_DOCUMENTS_BUCKET" \
              --kms-keyring "$KMS_KEYRING" \
              --kms-key "$KMS_KEY" \
              --output-dir ./reports \
              --dry-run \
              --verbose
          else
            ./contingency-test-cli \
              --project-id "$ADMIN_PROJECT_ID" \
              --app-project-id "$APP_PROJECT_ID" \
              --region "$REGION" \
              --db-instance "$DB_INSTANCE" \
              --documents-bucket "$GCS_DOCUMENTS_BUCKET" \
              --kms-keyring "$KMS_KEYRING" \
              --kms-key "$KMS_KEY" \
              --output-dir ./reports \
              --verbose
          fi

      - name: Upload CP-4 report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cp4-contingency-test-report
          path: reports/contingency-test-*.md
          retention-days: 365

  # ── IR-3: Red Team Exercise ──────────────────────────────────────
  red-team-exercise:
    name: IR-3 Red Team Exercise (Dry-Run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: latentarchon/redteam
          token: ${{ secrets.COMPLIANCE_REPO_TOKEN }}
          path: redteam

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build red team CLI
        working-directory: redteam
        run: go build -o ../redteam-cli ./cmd/redteam

      - name: Run red team dry-run (all suites)
        run: |
          cat > /tmp/monthly-targets.yaml <<'EOF'
          execution:
            dry_run: true
            rate_limit: "10ms"
            staging_only: true
            kill_on_breach: true
            log_dir: "/tmp/redteam-logs"
            timeout_seconds: 5
            max_concurrency: 1
          targets:
            app_project:
              project_id: "latentarchon-app-staging"
              region: "us-east1"
              api_endpoint: "https://api.app.fed.staging.latentarchon.com"
              cloud_sql:
                connection_name: ""
                database: ""
              gcs:
                documents_bucket: ""
              cloud_tasks:
                queue_name: ""
                region: ""
              kms:
                key_ring: ""
                key_name: ""
              service_accounts: []
            admin_project:
              project_id: "latentarchon-admin-staging"
              region: "us-east1"
              api_endpoint: "https://api.admin.fed.staging.latentarchon.com"
              cloud_sql:
                connection_name: "latentarchon-admin-staging:us-east1:archon-db"
                database: "archon"
              gcs:
                documents_bucket: "latentarchon-admin-staging-documents"
              cloud_tasks:
                queue_name: "document-processing"
                region: "us-east1"
              kms:
                key_ring: "archon"
                key_name: "archon-key"
              service_accounts:
                - "archon-admin@latentarchon-admin-staging.iam.gserviceaccount.com"
          auth:
            firebase_api_key: ""
            app_test_email: ""
            app_test_password: ""
            admin_test_email: ""
            admin_test_password: ""
            totp_secret: ""
            forged_jwt_secret: "monthly-exercise-secret"
          EOF

          ./redteam-cli --config /tmp/monthly-targets.yaml --suite all --report-dir ./reports

      - name: Upload IR-3 report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ir3-red-team-report
          path: |
            reports/redteam-report-*.md
            /tmp/redteam-logs/
          retention-days: 365

  # ── AT-2: Security Awareness Training ───────────────────────────
  training-tracker:
    name: AT-2 Security Training Evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build training-tracker CLI
        working-directory: training-tracker
        run: go build -o ../training-tracker-cli ./cmd/training-tracker

      - name: Generate training report
        run: |
          ./training-tracker-cli \
            --personnel "Andrew Hendel (CEO/ISSO)" \
            --output-dir ./reports

      - name: Upload AT-2 report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: at2-training-report
          path: reports/training-report-*.md
          retention-days: 365

  # ── Upload to Drata ──────────────────────────────────────────────
  upload-drata-evidence:
    name: Upload Evidence to Drata
    runs-on: ubuntu-latest
    needs: [contingency-test, red-team-exercise, training-tracker]
    if: always() && (needs.contingency-test.result == 'success' || needs.red-team-exercise.result == 'success' || needs.training-tracker.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build drata-sync CLI
        working-directory: drata
        run: go build -o ../drata-sync ./cmd/drata-sync/

      - name: Download CP-4 report
        uses: actions/download-artifact@v4
        with:
          name: cp4-contingency-test-report
          path: ./artifacts/cp4/
        continue-on-error: true

      - name: Download IR-3 report
        uses: actions/download-artifact@v4
        with:
          name: ir3-red-team-report
          path: ./artifacts/ir3/
        continue-on-error: true

      - name: Download AT-2 report
        uses: actions/download-artifact@v4
        with:
          name: at2-training-report
          path: ./artifacts/at2/
        continue-on-error: true

      - name: Upload CP-4 report to Drata
        if: hashFiles('artifacts/cp4/contingency-test-*.md') != ''
        env:
          DRATA_API_KEY: ${{ secrets.DRATA_API_KEY }}
          DRATA_WORKSPACE_ID: ${{ secrets.DRATA_WORKSPACE_ID }}
        run: |
          REPORT=$(ls ./artifacts/cp4/contingency-test-*.md 2>/dev/null | head -1)
          if [ -n "$REPORT" ]; then
            ./drata-sync \
              --owner-id ${{ secrets.DRATA_OWNER_ID }} \
              --artifact-name "CP-4 Contingency Plan Test — $(date +%Y-%m-%d)" \
              --artifact-desc "Automated monthly contingency plan verification: Cloud SQL backup/PITR, GCS versioning, Cloud Run health, KMS key accessibility, Artifact Registry image availability. Maps to NIST 800-53 controls CP-2, CP-4, CP-9, CP-10, SC-12." \
              --artifact-file "$REPORT" \
              --artifact-controls "DCF-CP-2,DCF-CP-4,DCF-CP-9,DCF-CP-10,DCF-SC-12" \
              ci-artifact
          fi
        continue-on-error: true

      - name: Upload IR-3 report to Drata
        if: hashFiles('artifacts/ir3/reports/redteam-report-*.md') != ''
        env:
          DRATA_API_KEY: ${{ secrets.DRATA_API_KEY }}
          DRATA_WORKSPACE_ID: ${{ secrets.DRATA_WORKSPACE_ID }}
        run: |
          REPORT=$(ls ./artifacts/ir3/reports/redteam-report-*.md 2>/dev/null | head -1)
          if [ -n "$REPORT" ]; then
            ./drata-sync \
              --owner-id ${{ secrets.DRATA_OWNER_ID }} \
              --artifact-name "IR-3 Red Team Exercise — $(date +%Y-%m-%d)" \
              --artifact-desc "Monthly incident response exercise: 44 automated attacks across 3 suites (auth bypass, privilege escalation, data exfiltration). MITRE ATT&CK mapped. Validates IR detection and response capabilities per NIST 800-53 IR-3." \
              --artifact-file "$REPORT" \
              --artifact-controls "DCF-IR-1,DCF-IR-2,DCF-IR-3,DCF-IR-4,DCF-IR-5" \
              ci-artifact
          fi
        continue-on-error: true

      - name: Upload AT-2 report to Drata
        if: hashFiles('artifacts/at2/training-report-*.md') != ''
        env:
          DRATA_API_KEY: ${{ secrets.DRATA_API_KEY }}
          DRATA_WORKSPACE_ID: ${{ secrets.DRATA_WORKSPACE_ID }}
        run: |
          REPORT=$(ls ./artifacts/at2/training-report-*.md 2>/dev/null | head -1)
          if [ -n "$REPORT" ]; then
            ./drata-sync \
              --owner-id ${{ secrets.DRATA_OWNER_ID }} \
              --artifact-name "AT-2 Security Training Report — $(date +%Y-%m-%d)" \
              --artifact-desc "Monthly security awareness training attestation: 8 modules covering security fundamentals, phishing, insider threat, incident response, secure development, CUI handling, access control, and contingency procedures. Maps to NIST 800-53 AT-2, AT-2(1), AT-2(2), AT-3, IR-2, CP-3." \
              --artifact-file "$REPORT" \
              --artifact-controls "DCF-AT-1,DCF-AT-2,DCF-AT-3,DCF-AT-4" \
              ci-artifact
          fi
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "## Monthly Compliance Exercise Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Exercise | Control | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CP-4 Contingency Plan Test | CP-2, CP-4, CP-9, CP-10, SC-12 | ${{ needs.contingency-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| IR-3 Red Team Exercise | IR-1, IR-2, IR-3, IR-4, IR-5 | ${{ needs.red-team-exercise.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| AT-2 Security Training | AT-2, AT-2(1), AT-2(2), AT-3 | ${{ needs.training-tracker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Reports uploaded to Drata Evidence Library." >> $GITHUB_STEP_SUMMARY
