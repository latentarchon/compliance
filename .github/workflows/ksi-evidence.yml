name: KSI Evidence Collection

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 6am UTC
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  id-token: write

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      TARGET_ENV: ${{ inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/786733428651/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gh-ci-terraform@latentarchon-admin-staging.iam.gserviceaccount.com
          create_credentials_file: true

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Collect KSI evidence
        run: go run ./cmd/ksi-evidence --env "$TARGET_ENV"

      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ksi-evidence-${{ env.TARGET_ENV }}-${{ github.run_id }}
          path: evidence/
          retention-days: 365
