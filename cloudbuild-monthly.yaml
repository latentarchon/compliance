# Cloud Build — Monthly Compliance Exercises (CP-4 + IR-3 + AT-2)
#
# Triggered by: Cloud Scheduler (1st of month at 6:00 AM UTC)
# Runs contingency plan test, red team dry-run, training tracker.
# Uploads evidence to Drata via drata-sync CLI.
#
# Replaces: .github/workflows/monthly-exercises.yml
#
# Secrets required in Secret Manager:
#   - drata-api-key
#   - drata-workspace-id
#   - drata-owner-id

substitutions:
  _ADMIN_PROJECT_ID: archon-fed-admin-staging
  _APP_PROJECT_ID: archon-fed-app-staging
  _REGION: us-east1
  _DB_INSTANCE: archon-db
  _GCS_DOCUMENTS_BUCKET: archon-fed-ops-staging-documents
  _KMS_KEYRING: archon
  _KMS_KEY: archon-key
  _DRY_RUN: 'false'
  _GO_VERSION: '1.25'

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

steps:
  # ═══════════════════════════════════════════════════════════════════════
  # Step 1: CP-4 Contingency Plan Test
  # ═══════════════════════════════════════════════════════════════════════
  - id: cp4-build
    name: golang:${_GO_VERSION}
    dir: contingency-test
    entrypoint: go
    args: ['build', '-o', '/workspace/contingency-test-cli', './cmd/contingency-test']

  - id: cp4-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        mkdir -p /workspace/reports
        DRY_FLAG=""
        if [ "${_DRY_RUN}" = "true" ]; then DRY_FLAG="--dry-run"; fi
        /workspace/contingency-test-cli \
          --project-id "${_ADMIN_PROJECT_ID}" \
          --app-project-id "${_APP_PROJECT_ID}" \
          --region "${_REGION}" \
          --db-instance "${_DB_INSTANCE}" \
          --documents-bucket "${_GCS_DOCUMENTS_BUCKET}" \
          --kms-keyring "${_KMS_KEYRING}" \
          --kms-key "${_KMS_KEY}" \
          --output-dir /workspace/reports \
          $${DRY_FLAG} \
          --verbose
    waitFor: ['cp4-build']

  # ═══════════════════════════════════════════════════════════════════════
  # Step 2: IR-3 Red Team Exercise (dry-run)
  # ═══════════════════════════════════════════════════════════════════════
  - id: ir3-build
    name: golang:${_GO_VERSION}
    entrypoint: bash
    args:
      - -c
      - |
        # Clone redteam repo via Cloud Build SA credentials
        # The redteam source is fetched from the connected GitHub repo
        # For now, skip if redteam source is not available
        echo "IR-3 red team exercise requires separate trigger from redteam repo"
        echo "Skipping — configure a dedicated redteam Cloud Build trigger"
    waitFor: ['-']

  # ═══════════════════════════════════════════════════════════════════════
  # Step 3: AT-2 Security Training Evidence
  # ═══════════════════════════════════════════════════════════════════════
  - id: at2-build
    name: golang:${_GO_VERSION}
    dir: training-tracker
    entrypoint: go
    args: ['build', '-o', '/workspace/training-tracker-cli', './cmd/training-tracker']

  - id: at2-run
    name: alpine
    entrypoint: sh
    args:
      - -c
      - |
        mkdir -p /workspace/reports
        /workspace/training-tracker-cli \
          --personnel "Andrew Hendel (CEO/ISSO)" \
          --output-dir /workspace/reports
    waitFor: ['at2-build']

  # ═══════════════════════════════════════════════════════════════════════
  # Step 4: Build drata-sync CLI
  # ═══════════════════════════════════════════════════════════════════════
  - id: drata-build
    name: golang:${_GO_VERSION}
    dir: drata
    entrypoint: go
    args: ['build', '-o', '/workspace/drata-sync', './cmd/drata-sync/']

  # ═══════════════════════════════════════════════════════════════════════
  # Step 5: Upload evidence to Drata
  # ═══════════════════════════════════════════════════════════════════════
  - id: drata-upload
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    secretEnv: ['DRATA_API_KEY', 'DRATA_WORKSPACE_ID', 'DRATA_OWNER_ID']
    args:
      - -c
      - |
        DATE=$(date +%Y-%m-%d)

        # CP-4 report
        CP4_REPORT=$(ls /workspace/reports/contingency-test-*.md 2>/dev/null | head -1)
        if [ -n "$${CP4_REPORT}" ]; then
          /workspace/drata-sync \
            --owner-id "$$DRATA_OWNER_ID" \
            --artifact-name "CP-4 Contingency Plan Test — $${DATE}" \
            --artifact-desc "Automated monthly contingency plan verification" \
            --artifact-file "$${CP4_REPORT}" \
            --artifact-controls "DCF-CP-2,DCF-CP-4,DCF-CP-9,DCF-CP-10,DCF-SC-12" \
            ci-artifact || true
        fi

        # AT-2 report
        AT2_REPORT=$(ls /workspace/reports/training-report-*.md 2>/dev/null | head -1)
        if [ -n "$${AT2_REPORT}" ]; then
          /workspace/drata-sync \
            --owner-id "$$DRATA_OWNER_ID" \
            --artifact-name "AT-2 Security Training Report — $${DATE}" \
            --artifact-desc "Monthly security awareness training attestation" \
            --artifact-file "$${AT2_REPORT}" \
            --artifact-controls "DCF-AT-1,DCF-AT-2,DCF-AT-3,DCF-AT-4" \
            ci-artifact || true
        fi
    waitFor: ['cp4-run', 'at2-run', 'drata-build']

  # ═══════════════════════════════════════════════════════════════════════
  # Step 6: Archive reports to GCS
  # ═══════════════════════════════════════════════════════════════════════
  - id: archive
    name: gcr.io/cloud-builders/gsutil
    entrypoint: bash
    args:
      - -c
      - |
        DATE=$(date +%Y-%m-%d)
        gsutil cp /workspace/reports/*.md gs://${PROJECT_ID}-build-artifacts/compliance-exercises/$${DATE}/ || true
    waitFor: ['cp4-run', 'at2-run']

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/drata-api-key/versions/latest
      env: DRATA_API_KEY
    - versionName: projects/${PROJECT_ID}/secrets/drata-workspace-id/versions/latest
      env: DRATA_WORKSPACE_ID
    - versionName: projects/${PROJECT_ID}/secrets/drata-owner-id/versions/latest
      env: DRATA_OWNER_ID

timeout: 1800s
