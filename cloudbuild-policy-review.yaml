# Cloud Build — Policy Review Check
#
# Triggered by: Cloud Scheduler (1st of month at 7:00 AM UTC)
# Checks all policies/ for staleness (>365 days since last git modification).
# Uploads report to GCS and Drata.

substitutions:
  _GO_VERSION: '1.25'

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: policy-review
    name: golang:${_GO_VERSION}
    entrypoint: bash
    args:
      - -c
      - |
        mkdir -p /workspace/reports
        go run ./cmd/policy-review/ \
          --policies-dir policies \
          --output-dir /workspace/reports \
          --warn-only

  - id: drata-build
    name: golang:${_GO_VERSION}
    dir: drata
    entrypoint: go
    args: ['build', '-o', '/workspace/drata-sync', './cmd/drata-sync/']

  - id: drata-upload
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    secretEnv: ['DRATA_API_KEY', 'DRATA_WORKSPACE_ID', 'DRATA_OWNER_ID']
    args:
      - -c
      - |
        DATE=$(date +%Y-%m-%d)
        REPORT=$(ls /workspace/reports/policy-review-*.md 2>/dev/null | head -1)
        if [ -n "$${REPORT}" ]; then
          /workspace/drata-sync \
            --owner-id "$$DRATA_OWNER_ID" \
            --artifact-name "Policy Review Report — $${DATE}" \
            --artifact-desc "Monthly policy staleness check for *-1 controls" \
            --artifact-file "$${REPORT}" \
            --artifact-controls "DCF-AC-1,DCF-AT-1,DCF-AU-1,DCF-CA-1,DCF-CM-1,DCF-CP-1,DCF-IA-1,DCF-IR-1,DCF-MA-1,DCF-MP-1,DCF-PL-1,DCF-PM-1,DCF-PS-1,DCF-RA-1,DCF-SA-1,DCF-SC-1,DCF-SI-1,DCF-SR-1" \
            ci-artifact || true
        fi
    waitFor: ['policy-review', 'drata-build']

  - id: archive
    name: gcr.io/cloud-builders/gsutil
    entrypoint: bash
    args:
      - -c
      - |
        DATE=$(date +%Y-%m-%d)
        gsutil cp /workspace/reports/policy-review-*.md gs://${PROJECT_ID}-build-artifacts/policy-review/$${DATE}/ || true
    waitFor: ['policy-review']

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/drata-api-key/versions/latest
      env: DRATA_API_KEY
    - versionName: projects/${PROJECT_ID}/secrets/drata-workspace-id/versions/latest
      env: DRATA_WORKSPACE_ID
    - versionName: projects/${PROJECT_ID}/secrets/drata-owner-id/versions/latest
      env: DRATA_OWNER_ID

timeout: 300s
