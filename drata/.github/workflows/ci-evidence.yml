name: Push CI Evidence to Drata

# This workflow is called by the backend deploy workflow after a successful build.
# It uploads SBOMs, vulnerability scan reports, and other CI artifacts as evidence.
on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: 'Evidence name (e.g. "SBOM — backend v1.2.3")'
        required: true
        type: string
      artifact_description:
        description: 'Evidence description'
        required: false
        type: string
      artifact_path:
        description: 'Path to artifact file'
        required: true
        type: string
      control_ids:
        description: 'Comma-separated Drata control IDs to link'
        required: false
        type: string

  # Can also be triggered via repository_dispatch from other repos
  repository_dispatch:
    types: [push-evidence]

env:
  GO_VERSION: '1.23'

jobs:
  push-evidence:
    name: Upload Evidence
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build drata-sync
        working-directory: drata
        run: go build -o ../drata-sync ./cmd/drata-sync/

      - name: Upload artifact evidence
        env:
          DRATA_API_KEY: ${{ secrets.DRATA_API_KEY }}
          DRATA_WORKSPACE_ID: ${{ secrets.DRATA_WORKSPACE_ID }}
        run: |
          # Handle both workflow_dispatch and repository_dispatch
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            NAME="${{ github.event.client_payload.artifact_name }}"
            DESC="${{ github.event.client_payload.artifact_description }}"
            FILE="${{ github.event.client_payload.artifact_path }}"
            CONTROLS="${{ github.event.client_payload.control_ids }}"
          else
            NAME="${{ github.event.inputs.artifact_name }}"
            DESC="${{ github.event.inputs.artifact_description }}"
            FILE="${{ github.event.inputs.artifact_path }}"
            CONTROLS="${{ github.event.inputs.control_ids }}"
          fi

          CONTROL_FLAG=""
          if [ -n "$CONTROLS" ]; then
            CONTROL_FLAG="--artifact-controls=$CONTROLS"
          fi

          ./drata-sync \
            --owner-id ${{ secrets.DRATA_OWNER_ID }} \
            --artifact-name="$NAME" \
            --artifact-desc="$DESC" \
            --artifact-file="$FILE" \
            $CONTROL_FLAG \
            --verbose \
            ci-artifact
