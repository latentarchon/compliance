name: Drata Compliance Sync

on:
  # Run on schedule — weekly evidence refresh
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 6:00 UTC
  # Manual trigger
  workflow_dispatch:
    inputs:
      command:
        description: 'Sync command to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - evidence
          - vendors
          - risks
          - assets
          - status
      dry_run:
        description: 'Dry run (no API calls)'
        required: false
        default: false
        type: boolean

env:
  GO_VERSION: '1.23'

jobs:
  sync:
    name: Drata Sync
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout compliance repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build drata-sync
        working-directory: drata
        run: go build -o ../drata-sync ./cmd/drata-sync/

      - name: Run sync
        env:
          DRATA_API_KEY: ${{ secrets.DRATA_API_KEY }}
          DRATA_WORKSPACE_ID: ${{ secrets.DRATA_WORKSPACE_ID }}
        run: |
          COMMAND="${{ github.event.inputs.command || 'all' }}"
          DRY_RUN=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN="--dry-run"
          fi

          ./drata-sync \
            --compliance-dir . \
            --owner-id ${{ secrets.DRATA_OWNER_ID }} \
            --verbose \
            $DRY_RUN \
            "$COMMAND"
